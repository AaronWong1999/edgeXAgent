<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>edgeX Agent — Navigation Blueprint v5</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#0f0f1a; color:#eee; min-height:100vh; }
h1 { text-align:center; padding:24px 0 4px; font-size:24px; }
.subtitle { text-align:center; color:#888; font-size:12px; margin-bottom:16px; }
.stats { display:flex; justify-content:center; gap:40px; margin-bottom:20px; }
.stat { text-align:center; } .stat-num { font-size:28px; font-weight:700; color:#4a90d9; } .stat-label { font-size:11px; color:#888; }
.legend { background:#111827; border:1px solid #333; border-radius:10px; padding:14px 18px; margin:0 auto 20px; max-width:860px; font-size:12px; line-height:1.5; display:flex; flex-wrap:wrap; gap:16px; justify-content:center; }
.legend-item { display:flex; align-items:center; gap:6px; }
.legend-color { width:14px; height:14px; border-radius:3px; }
.search-bar { display:flex; justify-content:center; margin-bottom:20px; }
.search-bar input { padding:6px 14px; border-radius:20px; border:1px solid #444; background:#0e1621; color:#eee; font-size:13px; width:280px; outline:none; }
.search-bar input:focus { border-color:#4a90d9; }

.module { margin:0 auto 40px; max-width:1600px; padding:0 16px; }
.mod-hdr { display:flex; align-items:center; gap:12px; margin-bottom:16px; padding:10px 16px; border-radius:10px; }
.mod-hdr.m-trade { background:linear-gradient(135deg,#132b1e,#0a1a10); border:1px solid #2d6a4f; }
.mod-hdr.m-ai { background:linear-gradient(135deg,#131e2b,#0a1020); border:1px solid #4a90d9; }
.mod-hdr.m-event { background:linear-gradient(135deg,#2b2113,#1a140a); border:1px solid #e07c24; }
.mod-hdr.m-push { background:linear-gradient(135deg,#2b1313,#1a0a0a); border:1px solid #c0392b; }
.mod-hdr .ic { font-size:24px; } .mod-hdr .inf h2 { font-size:16px; color:#fff; } .mod-hdr .inf p { font-size:11px; color:#888; margin-top:2px; }

.flow-section { margin-bottom:12px; padding-left:8px; }
.flow-label { font-size:11px; color:#666; font-weight:600; margin-bottom:8px; padding:3px 8px; background:#111; border-radius:4px; display:inline-block; }
.flow-row { display:flex; align-items:flex-start; flex-wrap:wrap; gap:0; margin-bottom:6px; }
.or-div { display:flex; align-items:center; padding:0 10px; color:#555; font-size:11px; font-style:italic; }

.phone { width:260px; flex-shrink:0; background:#0e1621; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.3); border:2px solid #2a2a3e; transition:all .15s; position:relative; }
.phone:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,.4); }
.phone.shared { border-color:#e07c24 !important; }
.phone .ph-hdr { background:#17212b; padding:5px 8px; display:flex; align-items:center; gap:5px; border-bottom:1px solid #222; }
.phone .ph-hdr .av { width:20px; height:20px; border-radius:50%; background:#4a90d9; font-size:10px; display:flex; align-items:center; justify-content:center; }
.phone .ph-hdr .nm { font-weight:600; font-size:11px; }
.phone .ph-body { padding:5px 7px; }
.phone .bub { background:#182533; border-radius:0 7px 7px 7px; padding:5px 7px; font-size:10px; line-height:1.35; white-space:pre-wrap; word-break:break-word; }
.bub b { color:#fff; } .bub code { background:#0d1117; padding:1px 2px; border-radius:2px; font-size:9px; color:#7ee787; }
.bub .d { color:#777; font-style:italic; font-size:9px; }
.bg { display:flex; flex-wrap:wrap; gap:2px; margin-top:3px; }
.tb { flex:1 1 45%; min-width:0; padding:4px 2px; border-radius:4px; text-align:center; font-size:9px; cursor:default; border:none; font-weight:500; }
.tb.f { flex:1 1 100%; } .tb.t { flex:1 1 30%; } .tb.q { flex:1 1 22%; }
.tb.bl { background:#2f6ea5; color:#fff; } .tb.gn { background:#2d6a4f; color:#fff; } .tb.rd { background:#8b2c2c; color:#fff; }
.tb.gy { background:#2a3441; color:#aaa; } .tb.bk { background:#1e2a36; color:#6ba3d6; border:1px solid #2f4f6f; }
.phone .ft { padding:3px 5px; font-size:7px; color:#445; border-top:1px solid #1a2433; line-height:1.2; }
.phone .sid { position:absolute; top:30px; left:5px; font-size:7px; color:#333; font-family:monospace; }
.phone .lvl { position:absolute; top:30px; right:5px; font-size:7px; padding:1px 4px; border-radius:3px; font-weight:600; color:#fff; }
.lvl.l1 { background:#2d6a4f; } .lvl.l2 { background:#4a90d9; } .lvl.l3 { background:#e07c24; } .lvl.lp { background:#c0392b; }
.phone .shared-badge { position:absolute; top:30px; right:28px; font-size:7px; padding:1px 4px; border-radius:3px; font-weight:600; color:#e07c24; background:#2b1a0a; border:1px solid #e07c24; }

.tree-indent { padding-left:40px; border-left:2px solid #333; margin-left:14px; }
.tree-item { position:relative; padding:4px 0; }
.tree-item::before { content:''; position:absolute; left:-40px; top:16px; width:36px; height:2px; background:#333; }
.tree-item:last-child::after { content:''; position:absolute; left:-42px; top:16px; bottom:0; width:4px; background:#0f0f1a; }

.seq-a { display:flex; align-items:center; padding:0 5px; flex-direction:column; }
.seq-a .arr { color:#c0392b; font-size:18px; font-weight:bold; }
.seq-a .albl { font-size:8px; color:#777; text-align:center; max-width:60px; }

.phone.highlight { border-color:#4a90d9 !important; box-shadow:0 0 10px rgba(74,144,217,.4) !important; }
.phone.dimmed { opacity:.15; }
@media(max-width:700px) { .phone { width:100%; } }
</style>
</head>
<body>
<h1>edgeX Agent — Navigation Blueprint v5</h1>
<p class="subtitle">100% code-accurate — every text, button, callback_data matches main.py</p>

<div class="stats">
<div class="stat"><div class="stat-num">3</div><div class="stat-label">Modules</div></div>
<div class="stat"><div class="stat-num">28</div><div class="stat-label">Screens</div></div>
<div class="stat"><div class="stat-num">3</div><div class="stat-label">Max Depth</div></div>
<div class="stat"><div class="stat-num">8</div><div class="stat-label">Shared Screens</div></div>
</div>

<div class="legend">
<div class="legend-item"><div class="legend-color" style="background:#2d6a4f"></div>L1 Dashboard</div>
<div class="legend-item"><div class="legend-color" style="background:#4a90d9"></div>L2 Module Hub</div>
<div class="legend-item"><div class="legend-color" style="background:#e07c24"></div>L3 Sub-screen</div>
<div class="legend-item"><div class="legend-color" style="background:#c0392b"></div>Push (bot-initiated)</div>
<div class="legend-item"><div class="legend-color" style="background:transparent;border:2px solid #e07c24"></div>Shared screen</div>
<div class="legend-item">├── = parent→child</div>
<div class="legend-item"><span style="color:#555">or</span> = mutually exclusive</div>
<div class="legend-item"><span style="color:#c0392b">→</span> = edits same msg</div>
</div>

<div class="search-bar"><input type="text" id="search" placeholder="Search screens..."></div>

<div id="app"></div>

<script>
function P(id,t,b,btns,ft,lv,shared) {
  let bg='';
  if(btns&&btns.length){bg='<div class="bg">';for(const x of btns){let c=`tb ${x.c||'bl'}`;if(x.w)c+=' '+x.w;bg+=`<button class="${c}">${x.t}</button>`;}bg+='</div>';}
  const lvMap={1:'l1',2:'l2',3:'l3','P':'lp'};
  const lvT=lv==='P'?'Push':'L'+lv;
  const sh=shared?`<span class="shared-badge">SHARED</span>`:'';
  return `<div class="phone${shared?' shared':''}" data-search="${(t+' '+id+' '+(ft||'')).toLowerCase()}" data-id="${id}"><span class="sid">#${id}</span>${sh}<span class="lvl ${lvMap[lv]||'l2'}">${lvT}</span><div class="ph-hdr"><div class="av">🤖</div><div class="nm">edgeX Agent</div></div><div class="ph-body"><div class="bub">${b}</div>${bg}</div><div class="ft">${ft||''}</div></div>`;
}
function A(label){return `<div class="seq-a"><span class="arr">→</span><span class="albl">${label||''}</span></div>`;}
function OR(){return `<div class="or-div">or</div>`;}

let html='';

// ═══════════ DASHBOARD ═══════════
const DASH_BODY = (edgex, ai) =>
  `🤖 <b>edgeX Agent — Your Own AI Trading Agent</b>\n\n${edgex}\n${ai}\n\n👇 Tap a button or just talk to me:\n\n<span class="d">"BTC's looking juicy, should I ape in?"</span>\n<span class="d">"ソラナをロングしたい、少しだけ"</span>\n<span class="d">"지금 SILVER 상황 어때?"</span>\n<span class="d">"CRCL涨的离谱，怎么操作"</span>\n<span class="d">"Короткий NVDA на 100$"</span>`;

html+=`<div class="module"><div class="mod-hdr m-trade"><div class="ic">🤖</div><div class="inf"><h2>Dashboard (L1)</h2><p>/start → new message. 3 buttons always. All navigation edits this message in-place.</p></div></div>`;
html+=`<div class="flow-section"><div class="flow-label">3 Dashboard States (mutually exclusive)</div><div class="flow-row">`;

html+=P('dash_new','Dashboard: New User',
  DASH_BODY('👤 edgeX: not connected', '✨ AI: not activated'),
  [{t:'🔗 Connect edgeX',c:'bl f'},{t:'✨ Activate AI',c:'gn f'},{t:'📰 Event Trading',c:'bl f'}],
  'State 1: new user. callback_data: show_login / ai_activate_prompt / news_settings', 1);

html+=OR();

html+=P('dash_conn','Dashboard: Connected',
  DASH_BODY('👤 edgeX: <code>71303066234567</code> ✅', '✨ AI: not activated'),
  [{t:'📈 Trade on edgeX',c:'bl f'},{t:'✨ Activate AI',c:'gn f'},{t:'📰 Event Trading',c:'bl f'}],
  'State 2: connected, no AI. callback_data: trade_hub / ai_activate_prompt / news_settings', 1);

html+=OR();

html+=P('dash_full','Dashboard: Full State',
  DASH_BODY('👤 edgeX: <code>71303066234567</code> ✅', '✨ AI: Active ✅'),
  [{t:'📈 Trade on edgeX',c:'bl f'},{t:'🤖 AI Agent',c:'bl f'},{t:'📰 Event Trading',c:'bl f'}],
  'State 3: all active. callback_data: trade_hub / ai_hub / news_settings', 1);

html+=`</div></div></div>`;


// ═══════════ MODULE 1: TRADE ON EDGEX ═══════════
html+=`<div class="module"><div class="mod-hdr m-trade"><div class="ic">📈</div><div class="inf"><h2>Trade on edgeX</h2><p>Login required. Account overview + positions with leverage + P&L, close, orders, history, disconnect.</p></div></div>`;

// Before/after login
html+=`<div class="flow-section"><div class="flow-label">📈 / 🔗 Button: before vs after login</div><div class="flow-row">`;

html+=P('show_login','🔗 Connect edgeX',
  `🔗 <b>Connect edgeX — edgeX Agent</b>\n\nChoose how to connect:`,
  [{t:'⚡ One-Click OAuth (soon)',c:'gy f'},{t:'🔑 Connect with API Key',c:'bl f'},{t:'👤 Aaron\'s Account (temp)',c:'gn f'},{t:'🔙 Back',c:'bk f'}],
  'Dashboard (new) → here. callback_data: login_oauth / login_api / login_demo / back_to_dashboard', 2, true);

html+=OR();

html+=P('trade_hub','📈 Trade Hub',
  `📈 <b>Trade on edgeX — edgeX Agent</b>\n\n├ Equity: <code>$1,234.56</code>\n└ Available: <code>$890.12</code>\n\n<b>Open Positions (2):</b>\n🟢 BTC LONG <code>0.01</code> (5x) | PnL: <code>+$12.30</code>\n🔴 ETH SHORT <code>0.5</code> (3x) | PnL: <code>-$5.20</code>\n\nUnrealized P&L: 🟢 <code>+$7.10</code>`,
  [{t:'🔴 Close Position',c:'rd'},{t:'📋 Orders',c:'bl'},{t:'📜 History',c:'bl'},{t:'🚪 Disconnect',c:'rd'},{t:'🔙 Back',c:'bk f'}],
  'Dashboard (connected) → here. callback_data: quick_close / quick_orders / quick_history / logout_confirm / back_to_dashboard', 2, true);

html+=`</div>`;

// Connect edgeX children
html+=`<div class="flow-label" style="margin-top:10px">Connect edgeX → sub-screens</div>`;
html+=`<div class="tree-indent">`;

html+=`<div class="tree-item"><div class="flow-row">${P('login_oauth','⚡ One-Click Login',
  `⚡ <b>One-Click Login — edgeX Agent</b>\n\nComing Soon!\nFor now, use <b>Connect with API Key</b>.`,
  [{t:'🔙 Back',c:'bk f'}],
  'Connect → here. callback_data: show_login (back)', 3)}</div></div>`;

html+=`<div class="tree-item"><div class="flow-row">${P('login_api','🔑 Connect with API Key',
  `🔑 <b>Connect with API Key — edgeX Agent</b>\n\nPlease use the /start command, then choose <b>Connect with API Key</b>.\nThe API key setup requires a conversation flow.`,
  [{t:'🔙 Back',c:'bk f'}],
  'Connect → here. In ConvHandler: prompts for Account ID then Private Key. callback_data: show_login (back)', 3)}</div></div>`;

html+=`<div class="tree-item"><div class="flow-row">${P('login_demo','👤 Aaron\'s Account (temp)',
  `🔄 Connecting to Aaron's edgeX account...\n\n✅ Connected → returns to Dashboard (full state)`,
  [],
  'Connect → here. Auto-connects demo account + activates AI. Returns to Dashboard.', 3)}</div></div>`;

html+=`</div>`;

// Trade Hub children
html+=`<div class="flow-label" style="margin-top:10px">Trade Hub → sub-screens</div>`;
html+=`<div class="tree-indent">`;

html+=`<div class="tree-item"><div class="flow-row">${P('quick_close','🔴 Close Position',
  `🔴 <b>Close Position — edgeX Agent</b>\n\nSelect a position to close:\n\n• BTC LONG | Size: 0.01 | PnL: +$12.30\n• ETH SHORT | Size: 0.5 | PnL: -$5.20`,
  [{t:'Close BTC LONG',c:'rd f'},{t:'Close ETH SHORT',c:'rd f'},{t:'🔙 Back',c:'bk f'}],
  'Trade Hub → here. Per-position: close_{contractId}. Back → trade_hub', 3)}</div></div>`;

html+=`<div class="tree-item"><div class="flow-row">${P('quick_orders','📋 Open Orders',
  `📋 <b>Open Orders — edgeX Agent</b>\n\n2 order(s):\n\n  • BTC BUY LIMIT | Size: 100 | Price: $70,000\n  • ETH SELL LIMIT | Size: 50 | Price: $4,100`,
  [{t:'❌ Cancel BTC BUY 100@70000',c:'rd f'},{t:'❌ Cancel ETH SELL 50@4100',c:'rd f'},{t:'❌ Cancel All Orders',c:'rd f'},{t:'🔙 Back',c:'bk f'}],
  'Trade Hub → here. Per-order: cancelone_{orderId}. cancelorders_all. Back → trade_hub', 3)}</div></div>`;

html+=`<div class="tree-item"><div class="flow-row">${P('quick_history','📜 Recent Trades',
  `📜 <b>Recent Trades — edgeX Agent</b>\n\n🟢 BTC BUY 0.01 @ $71,234.00 | PnL: +$2.3400 | 03/05 08:00\n🔴 DOGE SELL 300 @ $0.09600 | PnL: -$0.0300 | 03/05 07:30`,
  [{t:'🔙 Back',c:'bk f'}],
  'Trade Hub → here. Back → trade_hub', 3, true)}</div></div>`;

html+=`<div class="tree-item"><div class="flow-row">${P('logout_confirm','🚪 Disconnect',
  `🚪 <b>Disconnect — edgeX Agent</b>\n\nThis will log out your edgeX account. Are you sure?`,
  [{t:'✅ Yes, logout',c:'rd'},{t:'❌ Cancel',c:'gy'}],
  'Trade Hub → here. logout_yes / logout_no. Cancel → Dashboard.', 3, true)}</div></div>`;

html+=`</div>`;
html+=`</div></div>`;


// ═══════════ MODULE 2: AI AGENT ═══════════
html+=`<div class="module"><div class="mod-hdr m-ai"><div class="ic">🤖</div><div class="inf"><h2>AI Agent</h2><p>Personality, AI provider, memory. Requires activation first.</p></div></div>`;

html+=`<div class="flow-section"><div class="flow-label">🤖 / ✨ Button: before vs after activation</div><div class="flow-row">`;

html+=P('ai_activate','✨ Activate AI',
  `✨ <b>Activate AI — edgeX Agent</b>\n\nChoose how to power your Agent:`,
  [{t:'💳 Use edgeX Account Balance',c:'gy f'},{t:'🔑 Use My Own API Key',c:'bl f'},{t:'⚡ Use Aaron\'s API (temp)',c:'gn f'}],
  'Dashboard (no AI) → here. Also: AI Hub > 🔑 AI Provider → here (SHARED). callback_data: ai_edgex_credits / ai_own_key_setup / ai_use_free', 2, true);

html+=OR();

html+=P('ai_hub','🤖 AI Agent Hub',
  `🤖 <b>AI Agent — edgeX Agent</b>\n\n├ 🎭 Personality: <code>🔥 Degen</code>\n├ 🔑 Provider: <code>deepseek-chat</code>\n└ 📝 Memory: <code>26</code> msgs, <code>2</code> summaries`,
  [{t:'🎭 Personality',c:'bl'},{t:'🔑 AI Provider',c:'bl'},{t:'📝 Memory',c:'bl f'},{t:'🔙 Back',c:'bk f'}],
  'Dashboard (active) → here. callback_data: change_persona / ai_activate_prompt / settings_memory / back_to_dashboard', 2);

html+=`</div>`;

// Activate AI children
html+=`<div class="flow-label" style="margin-top:10px">Activate AI → sub-screens</div>`;
html+=`<div class="tree-indent">`;

html+=`<div class="tree-item"><div class="flow-row">${P('ai_credits','💳 edgeX Balance',
  `💳 <b>edgeX Balance — edgeX Agent</b>\n\nComing Soon.\nUse /setai to add your own API key.`,
  [{t:'🔙 Back',c:'bk f'}],
  'Activate → here. callback_data: ai_activate_prompt (back)', 3)}</div></div>`;

html+=`<div class="tree-item"><div class="flow-row">${P('ai_own_key_setup','🔑 AI Provider',
  `🔑 <b>AI Provider — edgeX Agent</b>\n\nChoose your provider:`,
  [{t:'OpenAI / DeepSeek',c:'bl f'},{t:'Anthropic (Claude)',c:'bl f'},{t:'Google Gemini',c:'bl f'}],
  'Activate → here. callback_data: setai_openai / setai_anthropic / setai_gemini → /setai redirect', 3)}</div></div>`;

// setai_* redirect screen
html+=`<div class="tree-item" style="margin-left:40px;padding-left:40px;border-left:2px solid #333;"><div class="flow-row">${P('setai_redirect','🔑 Provider → /setai redirect',
  `🔑 <b>OpenAI / DeepSeek — edgeX Agent</b>\n\nTo set up OpenAI / DeepSeek, use the /setai command.\nIt will walk you through entering your API key.`,
  [{t:'🔙 Back',c:'bk f'}],
  'Provider → setai_* → here. callback_data: ai_own_key_setup (back)', 3)}</div></div>`;

html+=`<div class="tree-item"><div class="flow-row">${P('ai_use_free','⚡ Use Aaron\'s API',
  `✅ <b>AI Activated — edgeX Agent</b>\n\nChoose your Agent's personality:`,
  [{t:'🔥 Degen',c:'bl'},{t:'🎯 Sensei',c:'bl'},{t:'🤖 Cold Blood',c:'bl'},{t:'👀 Shitposter',c:'bl'},{t:'📚 Professor',c:'bl'},{t:'🐺 Wolf',c:'bl'},{t:'🌸 Moe',c:'bl f'},{t:'🔙 Back',c:'bk f'}],
  'Activate → free → persona picker. Pick → toast → AI Hub. callback_data: persona_{name} / ai_hub', 3)}</div></div>`;

html+=`</div>`;

// AI Hub children
html+=`<div class="flow-label" style="margin-top:10px">AI Agent Hub → sub-screens</div>`;
html+=`<div class="tree-indent">`;

html+=`<div class="tree-item"><div class="flow-row">${P('persona','🎭 Personality',
  `🎭 <b>Personality — edgeX Agent</b>\n\nChoose your Agent's vibe:`,
  [{t:'🔥 Degen',c:'bl'},{t:'🎯 Sensei',c:'bl'},{t:'🤖 Cold Blood',c:'bl'},{t:'👀 Shitposter',c:'bl'},{t:'📚 Professor',c:'bl'},{t:'🐺 Wolf',c:'bl'},{t:'🌸 Moe',c:'bl f'},{t:'🔙 Back',c:'bk f'}],
  'AI Hub → here. Pick → toast "✅ Personality: X" → edits to AI Hub. callback_data: persona_{name} / ai_hub', 3, true)}</div></div>`;

html+=`<div class="tree-item"><div class="flow-row">${P('ai_provider_from_hub','🔑 AI Provider (from Hub)',
  `→ Same screen as ✨ Activate AI (SHARED)\n\n✨ <b>Activate AI — edgeX Agent</b>\n\nChoose how to power your Agent:`,
  [{t:'💳 Use edgeX Account Balance',c:'gy f'},{t:'🔑 Use My Own API Key',c:'bl f'},{t:'⚡ Use Aaron\'s API (temp)',c:'gn f'}],
  'AI Hub > 🔑 AI Provider → ai_activate_prompt → same screen as Activate AI. SHARED.', 2, true)}</div></div>`;

html+=`<div class="tree-item"><div class="flow-row">${P('settings_memory','📝 Memory',
  `📝 <b>Memory — edgeX Agent</b>\n\n├ Messages: <code>26</code>\n├ Summaries: <code>2</code>\n└ Preferences: yes`,
  [{t:'🗑 Clear Memory',c:'rd f'},{t:'🔙 Back',c:'bk f'}],
  'AI Hub → here. callback_data: memory_clear_confirm / ai_hub (back)', 3)}</div></div>`;

// Memory children
html+=`<div class="tree-item" style="margin-left:40px;padding-left:40px;border-left:2px solid #333;"><div class="flow-row">${P('memory_clear','🗑 Clear Memory',
  `🗑 <b>Clear Memory — edgeX Agent</b>\n\nAll conversation history and preferences will be deleted.`,
  [{t:'✅ Yes, clear all',c:'rd'},{t:'❌ Keep',c:'gy'}],
  'Memory → here. memory_clear_yes → "✅ Memory cleared." (Back → ai_hub). memory_clear_no → Memory screen.', 3)}</div></div>`;

html+=`</div>`;
html+=`</div></div>`;


// ═══════════ MODULE 3: EVENT TRADING ═══════════
html+=`<div class="module"><div class="mod-hdr m-event"><div class="ic">📰</div><div class="inf"><h2>Event Trading</h2><p>AI-analyzed news with one-tap trade. No login required. Same for all users.</p></div></div>`;

html+=`<div class="flow-section"><div class="flow-label">📰 Event Trading Hub (news_settings)</div><div class="flow-row">`;

document.getElementById("search").addEventListener("input", e => {
  const q=e.target.value.toLowerCase();
  document.querySelectorAll(".phone").forEach(p=>{
    if(!q){p.classList.remove("dimmed","highlight");return;}
    if(p.dataset.search.includes(q)){p.classList.add("highlight");p.classList.remove("dimmed");}
    else{p.classList.add("dimmed");p.classList.remove("highlight");}
  });
});
