<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#eee;min-height:100vh}
h1{text-align:center;padding:24px 0 4px;font-size:24px}.subtitle{text-align:center;color:#888;font-size:12px;margin-bottom:16px}
.stats{display:flex;justify-content:center;gap:40px;margin-bottom:20px}.stat{text-align:center}.stat-num{font-size:28px;font-weight:700;color:#4a90d9}.stat-label{font-size:11px;color:#888}
.legend{background:#111827;border:1px solid #333;border-radius:10px;padding:14px 18px;margin:0 auto 20px;max-width:960px;font-size:12px;line-height:1.5;display:flex;flex-wrap:wrap;gap:16px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:6px}.legend-color{width:14px;height:14px;border-radius:3px}
.search-bar{display:flex;justify-content:center;margin-bottom:20px}.search-bar input{padding:6px 14px;border-radius:20px;border:1px solid #444;background:#0e1621;color:#eee;font-size:13px;width:280px;outline:none}
.search-bar input:focus{border-color:#4a90d9}
.module{margin:0 auto 40px;max-width:1600px;padding:0 16px}
.mod-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:10px 16px;border-radius:10px}
.mod-hdr.m-trade{background:linear-gradient(135deg,#132b1e,#0a1a10);border:1px solid #2d6a4f}
.mod-hdr.m-ai{background:linear-gradient(135deg,#131e2b,#0a1020);border:1px solid #4a90d9}
.mod-hdr.m-event{background:linear-gradient(135deg,#2b2113,#1a140a);border:1px solid #e07c24}
.mod-hdr.m-push{background:linear-gradient(135deg,#2b1313,#1a0a0a);border:1px solid #c0392b}
.mod-hdr .ic{font-size:24px}.mod-hdr .inf h2{font-size:16px;color:#fff}.mod-hdr .inf p{font-size:11px;color:#888;margin-top:2px}
.flow-section{margin-bottom:12px;padding-left:8px}.flow-label{font-size:11px;color:#666;font-weight:600;margin-bottom:8px;padding:3px 8px;background:#111;border-radius:4px;display:inline-block}
.flow-row{display:flex;align-items:flex-start;flex-wrap:wrap;gap:0;margin-bottom:6px}
.or-div{display:flex;align-items:center;padding:0 10px;color:#555;font-size:11px;font-style:italic}
.phone{width:270px;flex-shrink:0;background:#0e1621;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #2a2a3e;transition:all .15s;position:relative}
.phone:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.phone.shared{border-color:#e07c24!important}
.phone.modal{border-color:#c0392b!important;border-style:dashed!important}
.phone .ph-hdr{background:#17212b;padding:5px 8px;display:flex;align-items:center;gap:5px;border-bottom:1px solid #222}
.phone .ph-hdr .av{width:20px;height:20px;border-radius:50%;background:#4a90d9;font-size:10px;display:flex;align-items:center;justify-content:center}
.phone .ph-hdr .nm{font-weight:600;font-size:11px}
.phone .ph-body{padding:5px 7px}.phone .bub{background:#182533;border-radius:0 7px 7px 7px;padding:5px 7px;font-size:10px;line-height:1.35;white-space:pre-wrap;word-break:break-word}
.bub b{color:#fff}.bub code{background:#0d1117;padding:1px 2px;border-radius:2px;font-size:9px;color:#7ee787}
.bub .d{color:#777;font-style:italic;font-size:9px}
.bg{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.tb{flex:1 1 45%;min-width:0;padding:4px 2px;border-radius:4px;text-align:center;font-size:9px;cursor:default;border:none;font-weight:500}
.tb.f{flex:1 1 100%}.tb.t{flex:1 1 30%}.tb.q{flex:1 1 22%}
.tb.bl{background:#2f6ea5;color:#fff}.tb.gn{background:#2d6a4f;color:#fff}.tb.rd{background:#8b2c2c;color:#fff}
.tb.gy{background:#2a3441;color:#aaa}.tb.bk{background:#1e2a36;color:#6ba3d6;border:1px solid #2f4f6f}
.phone .ft{padding:3px 5px;font-size:7px;color:#445;border-top:1px solid #1a2433;line-height:1.2}
.phone .sid{position:absolute;top:30px;left:5px;font-size:7px;color:#333;font-family:monospace}
.phone .lvl{position:absolute;top:30px;right:5px;font-size:7px;padding:1px 4px;border-radius:3px;font-weight:600;color:#fff}
.lvl.l1{background:#2d6a4f}.lvl.l2{background:#4a90d9}.lvl.l3{background:#e07c24}.lvl.lp{background:#c0392b}.lvl.lm{background:#c0392b}
.phone .shared-badge{position:absolute;top:30px;right:28px;font-size:7px;padding:1px 4px;border-radius:3px;font-weight:600;color:#e07c24;background:#2b1a0a;border:1px solid #e07c24}
.phone .modal-badge{position:absolute;top:30px;right:28px;font-size:7px;padding:1px 4px;border-radius:3px;font-weight:600;color:#c0392b;background:#1a0a0a;border:1px solid #c0392b}
.tree-indent{padding-left:40px;border-left:2px solid #333;margin-left:14px}
.tree-item{position:relative;padding:4px 0}.tree-item::before{content:'';position:absolute;left:-40px;top:16px;width:36px;height:2px;background:#333}
.tree-item:last-child::after{content:'';position:absolute;left:-42px;top:16px;bottom:0;width:4px;background:#0f0f1a}
.seq-a{display:flex;align-items:center;padding:0 5px;flex-direction:column}.seq-a .arr{color:#c0392b;font-size:18px;font-weight:bold}.seq-a .albl{font-size:8px;color:#777;text-align:center;max-width:60px}
.note{background:#1a1a2e;border:1px solid #333;border-radius:6px;padding:6px 10px;font-size:9px;color:#888;margin:4px 0 4px 0;max-width:270px;line-height:1.4}
.note b{color:#bbb}
@media(max-width:700px){.phone{width:100%}}
</style>
</head>
<body>
<h1>edgeX Agent — Navigation Blueprint v7</h1>
<p class="subtitle">100% code-accurate — modals are NEW messages (dashed red border) — confirm edits modal to show result</p>
<div class="stats">
<div class="stat"><div class="stat-num">3</div><div class="stat-label">Modules</div></div>
<div class="stat"><div class="stat-num">42</div><div class="stat-label">Screens</div></div>
<div class="stat"><div class="stat-num">3</div><div class="stat-label">Max Depth</div></div>
</div>
<div class="legend">
<div class="legend-item"><div class="legend-color" style="background:#2d6a4f"></div>L1</div>
<div class="legend-item"><div class="legend-color" style="background:#4a90d9"></div>L2</div>
<div class="legend-item"><div class="legend-color" style="background:#e07c24"></div>L3</div>
<div class="legend-item"><div class="legend-color" style="background:#c0392b"></div>Push</div>
<div class="legend-item"><div class="legend-color" style="background:transparent;border:2px dashed #c0392b"></div>Modal (new msg)</div>
<div class="legend-item"><div class="legend-color" style="background:transparent;border:2px solid #e07c24"></div>Shared</div>
<div class="legend-item"><span style="color:#c0392b">→</span> edits same msg</div>
<div class="legend-item"><span style="color:#c0392b">⤵</span> new msg below</div>
<div class="legend-item">Title: <b>Screen — Parent Module</b></div>
</div>
<div class="search-bar"><input type="text" id="search" placeholder="Search screens..."></div>
<div id="app"></div>
<script>
function P(id,t,b,btns,ft,lv,flags){
let bg='';if(btns&&btns.length){bg='<div class="bg">';for(const x of btns){let c=`tb ${x.c||'bl'}`;if(x.w)c+=' '+x.w;bg+=`<button class="${c}">${x.t}</button>`;}bg+='</div>';}
const lvMap={1:'l1',2:'l2',3:'l3','P':'lp','M':'lm'};const lvT=lv==='P'?'Push':lv==='M'?'Modal':'L'+lv;
const sh=(flags||'').includes('S')?`<span class="shared-badge">SHARED</span>`:'';
const mo=(flags||'').includes('M')?`<span class="modal-badge">MODAL</span>`:'';
const cls=['phone'];if((flags||'').includes('S'))cls.push('shared');if((flags||'').includes('M'))cls.push('modal');
return`<div class="${cls.join(' ')}" data-search="${(t+' '+id+' '+(ft||'')).toLowerCase()}" data-id="${id}">`+
`<span class="sid">#${id}</span>${sh}${mo}<span class="lvl ${lvMap[lv]||'l2'}">${lvT}</span>`+
`<div class="ph-hdr"><div class="av">🤖</div><div class="nm">edgeX Agent</div></div>`+
`<div class="ph-body"><div class="bub">${b}</div>${bg}</div><div class="ft">${ft||''}</div></div>`;}
function A(label){return`<div class="seq-a"><span class="arr">→</span><span class="albl">${label||''}</span></div>`;}
function AN(label){return`<div class="seq-a"><span class="arr">⤵</span><span class="albl">${label||'new msg'}</span></div>`;}
function OR(){return`<div class="or-div">or</div>`;}
function NOTE(t){return`<div class="note">${t}</div>`;}
let html='';

// ═══ DASHBOARD ═══
const DB=(e,a)=>`🤖 <b>edgeX Agent — Your Own AI Trading Agent</b>\n\n${e}\n${a}\n\n👇 Tap a button or just talk to me:\n\n<span class="d">"BTC's looking juicy, should I ape in?"</span>\n<span class="d">"ソラナをロングしたい、少しだけ"</span>\n<span class="d">"지금 SILVER 상황 어때?"</span>\n<span class="d">"CRCL涨的离谱，怎么操作"</span>\n<span class="d">"Короткий NVDA на 100$"</span>`;
html+=`<div class="module"><div class="mod-hdr m-trade"><div class="ic">🤖</div><div class="inf"><h2>Dashboard (L1)</h2><p>/start → new msg. 3 buttons always. All nav edits in-place.</p></div></div>`;
html+=`<div class="flow-section"><div class="flow-label">3 Dashboard States</div><div class="flow-row">`;
html+=P('dash_new','New User',DB('👤 edgeX: not connected','✨ AI: not activated'),[{t:'🔗 Connect edgeX',c:'bl f'},{t:'✨ Activate AI',c:'gn f'},{t:'📰 Event Trading',c:'bl f'}],'show_login / ai_activate_prompt / news_settings',1);
html+=OR();
html+=P('dash_conn','Connected',DB('👤 edgeX: <code>71303066234567</code> ✅','✨ AI: not activated'),[{t:'📈 Trade on edgeX',c:'bl f'},{t:'✨ Activate AI',c:'gn f'},{t:'📰 Event Trading',c:'bl f'}],'trade_hub / ai_activate_prompt / news_settings',1);
html+=OR();
html+=P('dash_full','Full State',DB('👤 edgeX: <code>71303066234567</code> ✅','✨ AI: Active ✅'),[{t:'📈 Trade on edgeX',c:'bl f'},{t:'🤖 AI Agent',c:'bl f'},{t:'📰 Event Trading',c:'bl f'}],'trade_hub / ai_hub / news_settings',1);
html+=`</div></div></div>`;

// ═══ MODULE 1: TRADE ON EDGEX ═══
html+=`<div class="module"><div class="mod-hdr m-trade"><div class="ic">📈</div><div class="inf"><h2>Trade on edgeX</h2><p>Titles: "Screen — Trade on edgeX". Login required. Positions in $ value. Modals = new messages.</p></div></div>`;
html+=`<div class="flow-section"><div class="flow-label">📈 / 🔗 Before vs after login</div><div class="flow-row">`;
html+=P('show_login','🔗 Connect edgeX',`🔗 <b>Connect edgeX — Trade on edgeX</b>\n\nChoose how to connect:`,[{t:'⚡ One-Click OAuth (soon)',c:'gy f'},{t:'🔑 Connect with API Key',c:'bl f'},{t:'👤 Aaron\'s Account (temp)',c:'gn f'},{t:'🔙 Back',c:'bk f'}],'login_oauth / login_api / login_demo / back_to_dashboard',2,'S');
html+=OR();
html+=P('trade_hub','📈 Trade Hub',`📈 <b>Trade on edgeX — Trade on edgeX</b>\n\n├ Equity: <code>$1,234.56</code>\n└ Available: <code>$890.12</code>\n\n<b>Open Positions (2):</b>\n🟢 BTC LONG <code>$712.00</code> (5x) @ <code>$71,200.00</code> | PnL: <code>+$12.30</code>\n🔴 ETH SHORT <code>$1,500.00</code> (3x) @ <code>$3,000.00</code> | PnL: <code>-$5.20</code>\n\nUnrealized P&L: 🟢 <code>+$7.10</code>`,[{t:'📤 Share PnL',c:'bl f'},{t:'💰 Position',c:'bl'},{t:'📋 Orders',c:'bl'},{t:'📜 History',c:'bl'},{t:'🚪 Disconnect',c:'rd'},{t:'🔙 Back',c:'bk f'}],'quick_pnl / quick_close / quick_orders / quick_history / logout_confirm / back_to_dashboard',2,'S');
html+=`</div>`;

// Login sub-screens
html+=`<div class="flow-label" style="margin-top:10px">Connect edgeX → sub-screens</div><div class="tree-indent">`;
html+=`<div class="tree-item"><div class="flow-row">${P('login_oauth','⚡ One-Click Login',`⚡ <b>One-Click Login — Trade on edgeX</b>\n\nComing Soon! Waiting for edgeX team OAuth integration.\n\n<b>For edgeX Team:</b>\nOAuth endpoint ready at:\n<code>POST /api/v1/oauth/authorize</code>\n├ <code>client_id</code>: edgex-agent-tg-bot\n├ <code>redirect_uri</code>: https://t.me/edgeXAgentBot\n├ <code>scope</code>: trade,read\n└ <code>response_type</code>: code\n\nAfter user authorizes, redirect to:\n<code>GET /api/v1/oauth/callback?code={code}&state={tg_user_id}</code>\n\nFor now, use <b>Connect with API Key</b>.`,[{t:'🔙 Back',c:'bk f'}],'show_login',3)}</div></div>`;
html+=`<div class="tree-item"><div class="flow-row">${P('login_api','🔑 API Key',`🔑 <b>Connect with API Key — Trade on edgeX</b>\n\nGo to edgex.exchange → <b>API Management</b>\nCopy your <b>Account ID</b> and send it to me:`,[],'Text input → Private Key → validate',3)}${A('types ID')}${P('login_api2','🔑 Step 2',`🔑 <b>Step 2 — Trade on edgeX</b>\n\nNow send me your <b>Stark Private Key</b>:`,[],'Types key → validate → success',3)}${A('validate')}${P('login_ok','✅ Connected',`✅ <b>edgeX Connected!</b>\n\nEdits to Dashboard (full state).`,[],'Fail → error + retry.',3)}</div></div>`;
html+=`<div class="tree-item"><div class="flow-row">${P('login_demo','👤 Demo Login',`🔄 Connecting to Aaron's edgeX account...\n\n✅ → Dashboard`,[],'Auto-connects. Fail: error + Back.',3)}</div></div>`;
html+=`</div>`;

// Trade Hub sub-screens
html+=`<div class="flow-label" style="margin-top:10px">Trade Hub → sub-screens (edits in place)</div><div class="tree-indent">`;

// Share PnL screen
html+=`<div class="tree-item"><div class="flow-row">${P('quick_pnl','📤 Share PnL',`📤 <b>Share PnL — Trade on edgeX</b>\n\n<b>Unrealized P&L:</b> 🟢 <code>+$7.10</code>\n\n🟢 <b>BTC LONG</b> (5x) | $712.00 | PnL: <code>+$12.30</code> 🟢OPEN\n🔴 <b>ETH SHORT</b> (3x) | $1,500.00 | PnL: <code>-$5.20</code> 🟢OPEN\n🟢 BTC BUY 0.01 @ $71,234 | PnL: <code>+$2.34</code>\n🔴 DOGE SELL 300 @ $0.096 | PnL: <code>-$0.03</code>`,[{t:'📤 Share BTC LONG (+$12.30)',c:'bl f'},{t:'📤 Share ETH SHORT (-$5.20)',c:'bl f'},{t:'📤 Share BTC BUY (+$2.34)',c:'bl f'},{t:'📤 Share DOGE SELL (-$0.03)',c:'bl f'},{t:'◀ Prev',c:'gy'},{t:'Next ▶',c:'gy'},{t:'🔙 Back',c:'bk f'}],'Open + closed merged. ALL have share buttons. Pagination for >10.',3)}${AN('share click')}${P('share_card','📤 PnL Card',`──────────────────\n📈 <b>BTC/USDT</b> · LONG (5x)\n──────────────────\n\n💰 <b>PnL: +$12.30</b>\n🎯 <b>ROI: +8.2%</b>\n🟩🟩🟩🟩\n\n├ Entry Price: <code>$71,200.00</code>\n├ Mark Price: <code>$71,890.00</code>\n├ Position Value: <code>$712.00</code>\n└ Status: 🟢 OPEN\n\n⚡ Traded on <b>edgeX</b> via @edgeXAgentBot\n🔗 edgex.exchange`,[{t:'📤 Forward to Chat',c:'bl f'},{t:'📤 Share PnL',c:'bk f'}],'NEW message. User can forward. Bybit-style visual card.',3)}</div></div>`;

// Position screen + close modal
html+=`<div class="tree-item"><div class="flow-row">${P('quick_close','💰 Position',`💰 <b>Position — Trade on edgeX</b>\n\n🟢 <b>BTC LONG</b> (5x)\n  ├ Value: <code>$712.00</code> | Entry: <code>$71,200.00</code>\n  └ PnL: <code>+$12.30</code>\n\n🔴 <b>ETH SHORT</b> (3x)\n  ├ Value: <code>$1,500.00</code> | Entry: <code>$3,000.00</code>\n  └ PnL: <code>-$5.20</code>`,[{t:'🔴 Market Close BTC LONG',c:'rd f'},{t:'🔴 Market Close ETH SHORT',c:'rd f'},{t:'🔴 Market Close All',c:'rd f'},{t:'🔙 Back',c:'bk f'}],'close_confirm_{cid} / close_confirm_all. Back → trade_hub',3)}${AN('modal')}${P('close_modal','⚠️ Close Confirm',`🔴 <b>Market Close BTC — Trade on edgeX</b>\n\n⚠️ This will market-close your BTC position. Are you sure?`,[{t:'✅ Yes, close BTC',c:'gn f'},{t:'❌ Cancel',c:'rd f'}],'NEW message (modal). Yes → edits modal. Cancel → edits modal.',3,'M')}${A('✅ or ❌')}${P('close_result','Result',`🟢 <b>Close BTC LONG — Trade on edgeX</b>\n\n✅ LONG position closed\n\n├ Entry: <code>$71,234</code>\n├ Size: <code>0.01</code> | Value: <code>$712.00</code>\n├ Realized P&L: <code>+$12.30</code>\n├ Balance: <code>$1,246.86</code> (Available: <code>$1,200.00</code>)\n└ Order ID: <code>abc123</code>\n\n<span class="d">or: ❌ Close cancelled. No positions were closed.</span>`,[{t:'📊 Status',c:'bl'},{t:'📤 Share PnL',c:'bl'},{t:'📜 History',c:'bl'},{t:'📋 Orders',c:'bl'},{t:'🏠 Main Menu',c:'bk f'}],'Edits the modal msg. Shows success or cancel.',3)}</div></div>`;

// Orders screen + cancel modal
html+=`<div class="tree-item"><div class="flow-row">${P('quick_orders','📋 Orders',`📋 <b>Open Orders — Trade on edgeX</b>\n\n2 order(s):\n\n  • BTC BUY LIMIT (5x) | Size: 100 | Price: $70,000 | Now: $71,234 (1.7% away)\n  • ETH SELL LIMIT (3x) | Size: 50 | Price: $4,100 | Now: $3,950 (3.8% away)`,[{t:'❌ Cancel BTC BUY 100@70000',c:'rd f'},{t:'❌ Cancel ETH SELL 50@4100',c:'rd f'},{t:'❌ Cancel All Orders',c:'rd f'},{t:'🔙 Back',c:'bk f'}],'cancelone_confirm_{id} / cancelorders_confirm_all. Back → trade_hub',3)}${AN('modal')}${P('cancel_modal','⚠️ Cancel Confirm',`❌ <b>Cancel Order — Trade on edgeX</b>\n\nCancel this order?`,[{t:'✅ Yes, cancel',c:'gn f'},{t:'❌ Keep order',c:'rd f'}],'NEW message (modal). Yes → edits. Keep → edits.',3,'M')}${A('✅ or ❌')}${P('cancel_result','Result',`✅ <b>Order Cancelled — Trade on edgeX</b>\n\nOrder <code>abc123...</code> cancelled successfully.\n\n<span class="d">or: ❌ Cancelled. Orders kept.</span>`,[{t:'📋 Orders',c:'bl'},{t:'💰 Position',c:'bl'},{t:'🏠 Main Menu',c:'bk f'}],'Edits the modal msg.',3)}</div></div>`;

// History screen
html+=`<div class="tree-item"><div class="flow-row">${P('quick_history','📜 History',`📜 <b>Recent Trades — Trade on edgeX</b>\n\n🟢 BTC BUY LIMIT (5x) 0.01 @ $71,234.00 | PnL: +$2.3400 | 03/05 08:00\n🔴 DOGE SELL MARKET (3x) 300 @ $0.09600 | PnL: -$0.0300 | 03/05 07:30`,[{t:'🔙 Back',c:'bk f'}],'Up to 10 trades. Type + leverage. Back → trade_hub',3,'S')}</div></div>`;

// Logout modal
html+=`<div class="tree-item"><div class="flow-row">${P('logout','🚪 Disconnect',`🚪 <b>Disconnect — Trade on edgeX</b>\n\nThis will log out your edgeX account. Are you sure?`,[{t:'✅ Yes, logout',c:'rd'},{t:'❌ Cancel',c:'gy'}],'NEW message (modal). Yes/No → edits modal.',3,'M')}${A('✅ or ❌')}${P('logout_result','Result',`🚪 <b>Disconnect — Trade on edgeX</b>\n\n✅ Successfully logged out. Use /start to reconnect.\n\n<span class="d">or: ❌ Logout cancelled. Your account is still connected.</span>`,[{t:'🔗 Reconnect',c:'bl f'}],'Edits the modal. Success: Reconnect btn. Cancel: Trade Hub + Main Menu.',3)}</div></div>`;

html+=`</div></div></div>`;

// ═══ MODULE 2: AI AGENT ═══
html+=`<div class="module"><div class="mod-hdr m-ai"><div class="ic">🤖</div><div class="inf"><h2>AI Agent</h2><p>Titles: "Screen — AI Agent". Requires activation. Memory clear = modal.</p></div></div>`;
html+=`<div class="flow-section"><div class="flow-label">🤖 / ✨ Before vs after activation</div><div class="flow-row">`;
html+=P('ai_activate','✨ Activate AI',`✨ <b>Activate AI — AI Agent</b>\n\nChoose how to power your Agent:`,[{t:'💳 Use edgeX Account Balance',c:'gy f'},{t:'🔑 Use My Own API Key',c:'bl f'},{t:'⚡ Use Aaron\'s API (temp)',c:'gn f'}],'ai_edgex_credits / ai_own_key_setup / ai_use_free. SHARED: also from AI Hub > Provider.',2,'S');
html+=OR();
html+=P('ai_hub','🤖 AI Agent Hub',`🤖 <b>AI Agent — AI Agent</b>\n\n├ 🎭 Personality: <code>🔥 Degen</code>\n├ 🔑 Provider: <code>deepseek-chat</code>\n└ 📝 Memory: <code>26</code> msgs, <code>2</code> summaries`,[{t:'🎭 Personality',c:'bl'},{t:'🔑 AI Provider',c:'bl'},{t:'📝 Memory',c:'bl f'},{t:'🔙 Back',c:'bk f'}],'change_persona / ai_activate_prompt / settings_memory / back_to_dashboard',2);
html+=`</div>`;
